<style>
:root{
  --peat:#17140f; --peat-2:#211d16; --peat-3:#2c2820;
  --bone:#ede6d6; --bone-dim:#a99f8a;
  --rust:#c1502e; --rust-bright:#e06a41;
  --moss:#6b7b54; --slate:#5b7a8c; --amber:#c9962e; --ash:#7d7468;
  --line:#3a342a;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Public Sans',system-ui,sans-serif;background:var(--peat);color:var(--bone);overflow:hidden}
#app{display:flex;height:100vh;height:100dvh}

/* ---- panel ---- */
#panel{width:340px;min-width:340px;display:flex;flex-direction:column;background:var(--peat);border-right:1px solid var(--line);z-index:1000}
header{padding:18px 18px 12px;border-bottom:1px solid var(--line)}
h1{font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:30px;letter-spacing:.04em;text-transform:uppercase;line-height:1}
h1 .tick{color:var(--rust-bright)}
.sub{font-size:12px;color:var(--bone-dim);margin-top:5px}
.controls{padding:12px 18px;display:flex;flex-direction:column;gap:8px;border-bottom:1px solid var(--line)}
.controls input,.controls select{width:100%;background:var(--peat-2);border:1px solid var(--line);color:var(--bone);padding:9px 11px;border-radius:6px;font:inherit;font-size:14px}
.controls input::placeholder{color:var(--ash)}
.controls input:focus,.controls select:focus,button:focus-visible{outline:2px solid var(--rust);outline-offset:1px}
.row{display:flex;gap:8px}
.row>*{flex:1}
button.locate{background:var(--peat-3);border:1px solid var(--line);color:var(--bone);padding:9px;border-radius:6px;font:inherit;font-size:13px;font-weight:600;cursor:pointer}
button.locate:hover{border-color:var(--rust)}
.count{font-size:12px;color:var(--bone-dim);padding:8px 18px 0}
.count b{color:var(--bone)}

/* ---- list ---- */
#list{flex:1;overflow-y:auto;padding:6px 8px 14px;scrollbar-width:thin;scrollbar-color:var(--line) transparent}
.card{padding:10px;border-radius:8px;cursor:pointer;border:1px solid transparent}
.card:hover,.card.active{background:var(--peat-2);border-color:var(--line)}
.card .nm{font-weight:700;font-size:14.5px;display:flex;align-items:center;gap:7px}
.dot{width:9px;height:9px;border-radius:2px;flex:none}
.card .meta{font-size:12px;color:var(--bone-dim);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
.gr{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--slate);letter-spacing:.03em}
.dist{color:var(--amber)}
.badge{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:1px 6px;border-radius:3px}
.badge.closed,.badge.demolished{background:#5c2a1e;color:#f0b8a4}
.badge.refuge{background:#274552;color:#a9cfe0}
.badge.day{background:#4d3d17;color:#ecd08a}

footer{padding:10px 18px;border-top:1px solid var(--line);font-size:10.5px;color:var(--ash);line-height:1.5}
footer a{color:var(--bone-dim)}

/* ---- map ---- */
#map{flex:1;background:#0e0c09}
.leaflet-container{font:inherit}
.leaflet-popup-content-wrapper{background:var(--peat-2);color:var(--bone);border-radius:8px;border:1px solid var(--line)}
.leaflet-popup-tip{background:var(--peat-2)}
.pop h3{font-family:'Big Shoulders Display',sans-serif;font-size:20px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;margin-bottom:2px}
.pop .reg{font-size:11px;color:var(--bone-dim);margin-bottom:8px}
.pop dl{display:grid;grid-template-columns:auto 1fr;gap:3px 12px;font-size:12.5px}
.pop dt{color:var(--ash)}
.pop dd{margin:0}
.pop .note{margin-top:8px;font-size:12px;color:var(--amber)}
.pop .gr{font-size:12px}
.bothy-icon{display:flex;align-items:center;justify-content:center}
.bothy-icon svg{filter:drop-shadow(0 1px 2px rgba(0,0,0,.6))}

/* ---- mobile ---- */
@media(max-width:760px){
  #app{flex-direction:column-reverse}
  #panel{width:100%;min-width:0;height:46%;border-right:none;border-top:1px solid var(--line)}
  #map{height:54%}
  header{padding:12px 14px 8px}
  h1{font-size:24px}
}
@media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important}}
</style>
</head>

<script>
const DATA = JSON.parse(document.getElementById('data').textContent);
const STATUS_COLOR = {open:'#c1502e', closed:'#6e3322', demolished:'#524a3f', refuge:'#5b7a8c', day:'#c9962e'};

const map = L.map('map',{zoomControl:false}).setView([56.9,-4.6],7);
L.control.zoom({position:'topright'}).addTo(map);

const topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',{
  maxZoom:17, attribution:'© OpenStreetMap contributors, SRTM | © OpenTopoMap (CC-BY-SA)'});
const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:19, attribution:'© OpenStreetMap contributors'});
topo.addTo(map);
L.control.layers({'Topo':topo,'Street':osm},null,{position:'topright'}).addTo(map);

function icon(status){
  const c = STATUS_COLOR[status]||STATUS_COLOR.open;
  return L.divIcon({className:'bothy-icon',iconSize:[22,22],iconAnchor:[11,20],popupAnchor:[0,-18],
    html:`<svg width="22" height="22" viewBox="0 0 22 22"><path d="M11 2 L20 10 L18 10 L18 20 L4 20 L4 10 L2 10 Z" fill="${c}" stroke="#17140f" stroke-width="1.4"/></svg>`});
}

const markers = {};
let userLoc = null;

DATA.features.forEach(f=>{
  const p=f.properties,[lon,lat]=f.geometry.coordinates;
  const m=L.marker([lat,lon],{icon:icon(p.status),title:p.name}).addTo(map);
  m.bindPopup(popupHtml(p),{maxWidth:280});
  markers[f.id]=m;
});

function popupHtml(p){
  const badge = p.status!=='open' ? ` <span class="badge ${p.status}">${label(p.status)}</span>` : '';
  return `<div class="pop"><h3>${esc(p.name)}</h3>
  <div class="reg">${esc(p.region)} · ${esc(p.district)}${badge}</div>
  <dl>
    <dt>Grid ref</dt><dd class="gr">${esc(p.gridref)}</dd>
    <dt>Sleeps</dt><dd>${esc(p.sleeps||'—')}</dd>
    <dt>Elevation</dt><dd>${p.elevation_m} m</dd>
    ${p.estate?`<dt>Estate</dt><dd>${esc(p.estate)}</dd>`:''}
  </dl>
  ${p.note?`<div class="note">${esc(p.note)}</div>`:''}</div>`;
}
function label(s){return {closed:'Closed',demolished:'Demolished',refuge:'Refuge only',day:'No overnight'}[s]||s}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

/* region dropdown */
const regions=[...new Set(DATA.features.map(f=>f.properties.region))];
const sel=document.getElementById('region');
regions.forEach(r=>{const o=document.createElement('option');o.value=r;o.textContent=r;sel.appendChild(o)});

/* list rendering */
const listEl=document.getElementById('list'), qEl=document.getElementById('q'), countEl=document.getElementById('count');
let activeId=null;

function haversine(a,b,c,d){
  const R=6371,t=x=>x*Math.PI/180;
  const h=Math.sin(t(c-a)/2)**2+Math.cos(t(a))*Math.cos(t(c))*Math.sin(t(d-b)/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}

function render(){
  const q=qEl.value.trim().toLowerCase(), reg=sel.value;
  let rows=DATA.features.filter(f=>{
    const p=f.properties;
    return (!reg||p.region===reg)&&(!q||(p.name+' '+p.district+' '+p.gridref).toLowerCase().includes(q));
  });
  rows.forEach(f=>{
    const [lon,lat]=f.geometry.coordinates;
    f._d = userLoc ? haversine(userLoc[0],userLoc[1],lat,lon) : null;
  });
  rows.sort((a,b)=> userLoc ? a._d-b._d : a.properties.name.localeCompare(b.properties.name));

  countEl.innerHTML=`<b>${rows.length}</b> bothies shown${userLoc?' · sorted by distance':''}`;
  listEl.innerHTML='';
  const visible=new Set(rows.map(f=>f.id));
  DATA.features.forEach(f=>{
    const m=markers[f.id];
    if(visible.has(f.id)){ if(!map.hasLayer(m)) m.addTo(map); }
    else map.removeLayer(m);
  });

  rows.forEach(f=>{
    const p=f.properties;
    const el=document.createElement('div');
    el.className='card'+(f.id===activeId?' active':'');
    el.setAttribute('role','option'); el.tabIndex=0;
    const badge=p.status!=='open'?`<span class="badge ${p.status}">${label(p.status)}</span>`:'';
    el.innerHTML=`<div class="nm"><span class="dot" style="background:${STATUS_COLOR[p.status]}"></span>${esc(p.name)}${badge}</div>
      <div class="meta"><span class="gr">${esc(p.gridref)}</span><span>${esc(p.district)}</span><span>${p.elevation_m} m</span>${f._d!=null?`<span class="dist">${f._d.toFixed(0)} km</span>`:''}</div>`;
    const go=()=>{activeId=f.id;
      const [lon,lat]=f.geometry.coordinates;
      map.flyTo([lat,lon],12,{duration:.8});
      markers[f.id].openPopup();
      document.querySelectorAll('.card.active').forEach(x=>x.classList.remove('active'));
      el.classList.add('active');
    };
    el.addEventListener('click',go);
    el.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();go()}});
    listEl.appendChild(el);
  });
}

qEl.addEventListener('input',render);
sel.addEventListener('change',render);

document.getElementById('locate').addEventListener('click',()=>{
  if(!navigator.geolocation){countEl.textContent='Geolocation not available';return}
  countEl.textContent='Locating…';
  navigator.geolocation.getCurrentPosition(pos=>{
    userLoc=[pos.coords.latitude,pos.coords.longitude];
    L.circleMarker(userLoc,{radius:7,color:'#c9962e',fillColor:'#c9962e',fillOpacity:.9}).addTo(map).bindPopup('You are here');
    render();
  },()=>{countEl.textContent='Location denied — showing A–Z';render()},{enableHighAccuracy:false,timeout:8000});
});

render();

/* ---------- offline (PWA) ---------- */
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

const offmsg = document.getElementById('offmsg');
function say(t){ offmsg.hidden = !t; offmsg.textContent = t; }

window.addEventListener('offline', () => say('Offline — showing saved map areas & bothy data'));
window.addEventListener('online',  () => say(''));
if (!navigator.onLine) say('Offline — showing saved map areas & bothy data');

/* Save the visible area: fetch tiles for current view at z .. z+2, hard-capped
   to stay polite to the free OpenTopoMap server. */
const TILE_CAP = 250;
function lon2x(lon,z){ return Math.floor((lon+180)/360*Math.pow(2,z)); }
function lat2y(lat,z){ const r=lat*Math.PI/180;
  return Math.floor((1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2*Math.pow(2,z)); }

document.getElementById('savearea').addEventListener('click', async () => {
  if (!('caches' in window)) { say('Offline saving not supported in this browser'); return; }
  const b = map.getBounds(), z0 = Math.max(map.getZoom(), 8);
  const urls = [];
  for (let z = z0; z <= Math.min(z0 + 2, 15); z++) {
    const x1=lon2x(b.getWest(),z), x2=lon2x(b.getEast(),z);
    const y1=lat2y(b.getNorth(),z), y2=lat2y(b.getSouth(),z);
    for (let x=x1;x<=x2;x++) for (let y=y1;y<=y2;y++)
      urls.push(`https://a.tile.opentopomap.org/${z}/${x}/${y}.png`);
  }
  if (urls.length > TILE_CAP) {
    say(`Area too large (${urls.length} tiles, max ${TILE_CAP}) — zoom in and try again`);
    return;
  }
  const cache = await caches.open('bothy-tiles-v1');
  let done = 0, failed = 0;
  say(`Saving 0/${urls.length} tiles…`);
  for (const u of urls) {
    try {
      if (!(await cache.match(u))) {
        const r = await fetch(u);
        if (r.ok) await cache.put(u, r); else failed++;
        await new Promise(res => setTimeout(res, 60)); // gentle pace
      }
    } catch { failed++; }
    done++;
    if (done % 10 === 0 || done === urls.length) say(`Saving ${done}/${urls.length} tiles…`);
  }
  say(failed ? `Saved with ${failed} tiles missing — try again on better signal`
             : `✓ Area saved — this view now works offline`);
});
</script>
